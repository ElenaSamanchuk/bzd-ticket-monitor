name: BZD ticket monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    # pass.rw.by блокирует IP GitHub, но staronki.by (серверы в РБ) — нет.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CI: "true"
      BZD_USE_STARONKI: "1"
      STATE_FILE: .cache/notified.json
      EMAIL_TO: elenasamanchuk@gmail.com
      EMAIL_FROM: elenasamanchuk@gmail.com
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: elenasamanchuk@gmail.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            .cache/notified.json
            .cache/staronki_cookies.txt
          key: bzd-monitor-${{ github.repository }}

      - name: Check tickets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python3 monitor.py --once
