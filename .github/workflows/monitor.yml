name: BZD ticket monitor

on:
  schedule:
    # каждые 5 минут (минимум для GitHub cron)
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    # pass.rw.by блокирует IP облачных runner'ов GitHub (403).
    # Self-hosted на домашнем Mac использует тот же IP, что и локальный monitor.py.
    runs-on: self-hosted
    timeout-minutes: 5
    env:
      CI: "true"
      STATE_FILE: /Users/elena/Scripts/bzd-ticket-monitor/.cache/notified.json
      EMAIL_TO: elenasamanchuk@gmail.com
      EMAIL_FROM: elenasamanchuk@gmail.com
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: elenasamanchuk@gmail.com
    steps:
      - uses: actions/checkout@v4

      - name: Check tickets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python3 monitor.py --once
