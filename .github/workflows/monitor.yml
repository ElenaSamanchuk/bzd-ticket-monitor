name: BZD ticket monitor

on:
  schedule:
    # каждые 5 минут (минимум для GitHub cron)
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CI: "true"
      STATE_FILE: .cache/notified.json
      EMAIL_TO: elenasamanchuk@gmail.com
      EMAIL_FROM: elenasamanchuk@gmail.com
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: elenasamanchuk@gmail.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: .cache/notified.json
          key: bzd-notified-${{ github.repository }}

      - name: Check tickets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python3 monitor.py --once
